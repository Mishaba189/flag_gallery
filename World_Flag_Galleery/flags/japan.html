<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Japan Flag</title>
        <style>
            .flag{
                height: 200px;
                width: 300px;
                background-color: #fff;
                position: relative;
                border:0.5px solid rgba(235, 235, 235, 0.923);
                
            }
            .circle{
                height: 120px;
                width: 120px;
                border-radius: 50%;
                background-color:  #bc002d;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50% , -50%);
                
            }
            
        </style>

    </head>
    <body>
        <div class="flag">
            <div class="circle">
            </div>
        </div>
    </body>
</html>
