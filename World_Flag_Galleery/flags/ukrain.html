<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ukrain Flag</title>
        <style>
            .flag{
                height: 200px;
                width: 300px;
                display: grid;
                grid-template-rows: 1fr 1fr;
                border:0.5px solid rgba(235, 235, 235, 0.923);
            }
            .top{
                background-color: #005BBB;
            }
            .bottom{
                background-color: #FFD500;
            }


            
        </style>

    </head>
    <body>
        <div class="flag">
        <div class="top" ></div>
        <div class="bottom" ></div>
        </div>
    </body>
</html>
