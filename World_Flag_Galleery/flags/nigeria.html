<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Flag</title>
        <style>
            .flag{
                height: 200px;
                width: 400px;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                background-color: #008751;
                border:0.5px solid rgba(235, 235, 235, 0.923);
            }
            .center{
                background-color: #fff;
            }
            
        </style>

    </head>
    <body>
        <div class="flag">
            <div class="left"></div>
            <div class="center"></div>
            <div class="right"></div>
        </div>
    </body>
</html>
