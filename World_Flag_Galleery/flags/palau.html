<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Palau Flag</title>
        <style>
            .flag{
                height: 300px;
                width: 500px;
                background-color: #4aadd6;
                position: relative;
                border:0.5px solid rgba(235, 235, 235, 0.923);
            }
            .circle{
                height: 180px;
                width: 180px;
                background-color: #ffde00;
                border-radius: 50%;
                position: absolute;
                left:43.75%;
                top: 50%;
                transform: translate(-50%, -50%);
            }
        </style>

    </head>
    <body>
        <div class="flag">
            <div class="circle">
            </div>
        </div>
    </body>
</html>
