<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Poland Flag</title>
        <style>
            .flag{
                height: 500px;
                width: 800px;
                display: grid;
                grid-template-rows: 1fr 1fr;
                background-color: #fff;
                border:0.5px solid rgba(235, 235, 235, 0.923);
            }
            .bottom{
                background-color: #dc143c;
            }
            
        </style>

    </head>
    <body>
        <div class="flag">
            <div class="top"></div>
            <div class="bottom"></div>
        </div>
    </body>
</html>
