<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Flag</title>
        <style>
            .flag{
                height: 300px;
                width: 500px;
                background-color: #006a4e;
                position: relative;
                border:0.5px solid rgba(235, 235, 235, 0.923);
            }
            .circle{
                height: 200px;
                width: 200px;
                background-color: #f42a41;
                border-radius: 50%;
                position: absolute;
                left: 45%;
                top: 50%;
                transform: translate( -50% , -50%);
            }

            
        </style>

    </head>
    <body>
        <div class="flag">
            <div class="circle"></div>
        </div>
    </body>
</html>
