<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> World Flag Gallery</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>

    <header>
        <h1>World Flags Gallery</h1>
        <p>Every national flag built from scratch.</p>
    </header>

    <main class="flag-grid">
        
        <div class="flag-card">
            <div class="flag flag-palau"></div>
            <div class="flag-info">
                <h3> Palau</h3>
                <code>.flag-palau</code>
            </div>
        </div>

        <div class="flag-card">
            <div class="flag flag-japan"></div>
            <div class="flag-info">
                <h3>Japan</h3>
                <code>.flag-japan</code>
            </div>
        </div>

        <div class="flag-card">
            <div class="flag flag-ukraine"></div>
            <div class="flag-info">
                <h3>Ukraine</h3>
                <code>.flag-ukraine</code>
            </div>
        </div>

        </main>

</body>
</html>
